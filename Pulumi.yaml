name: datacorp
runtime: nodejs
description: Multi-tenant customer storage provisioning for DataCorp

template:
  displayName: DataCorp Customer Storage
  description: Deploy an isolated, encrypted S3 storage bucket for a new customer
  config:
    customerName:
      type: string
      description: Customer name (lowercase, alphanumeric and hyphens only)
    aws:region:
      description: AWS region for data residency
      default: us-west-2
      allowedValues:
        - us-west-2
        - ca-central-1
    owner:
      type: string
      description: Override the default owner (auto-detected from IAM caller identity)
      default: ""
